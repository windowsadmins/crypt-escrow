name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = Get-Date -Format "yyyy.MM.dd.HHmm"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build binaries
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          foreach ($rid in @("win-x64", "win-arm64")) {
            Write-Host "Publishing for $rid..."
            dotnet publish src/CryptEscrow/CryptEscrow.csproj `
              -c Release -r $rid --self-contained `
              -p:PublishSingleFile=true `
              -p:PublishTrimmed=true `
              -p:TrimMode=partial `
              -p:Version=$version

            $arch = if ($rid -eq "win-x64") { "x64" } else { "arm64" }
            New-Item -ItemType Directory -Path "dist/$arch" -Force | Out-Null
            Copy-Item "src/CryptEscrow/bin/Release/net10.0-windows/$rid/publish/checkin.exe" "dist/$arch/checkin.exe" -Force
            Write-Host "Built: dist/$arch/checkin.exe"
          }

      - name: Import signing certificate
        id: cert
        if: env.CODE_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        env:
          CODE_SIGNING_CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT_BASE64 }}
          CODE_SIGNING_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CERT_PASSWORD }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT_BASE64)
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          $securePassword = ConvertTo-SecureString $env:CODE_SIGNING_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          echo "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          Remove-Item $pfxPath -Force
          Write-Host "Certificate imported: $($cert.Subject)"

      - name: Locate signtool
        id: signtool
        if: steps.cert.outputs.thumbprint != ''
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1
          if ($signtool) {
            echo "path=$($signtool.FullName)" >> $env:GITHUB_OUTPUT
            Write-Host "Found signtool: $($signtool.FullName)"
          } else {
            Write-Host "::warning::signtool.exe not found on runner"
          }

      - name: Sign binaries
        if: steps.cert.outputs.thumbprint != '' && steps.signtool.outputs.path != ''
        shell: pwsh
        run: |
          $signtool = "${{ steps.signtool.outputs.path }}"
          $thumbprint = "${{ steps.cert.outputs.thumbprint }}"
          $tsas = @('http://timestamp.digicert.com', 'http://timestamp.sectigo.com')

          foreach ($arch in @("x64", "arm64")) {
            $exe = "dist/$arch/checkin.exe"
            $signed = $false
            foreach ($tsa in $tsas) {
              & $signtool sign /fd SHA256 /tr $tsa /td SHA256 /sha1 $thumbprint $exe 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Signed: $exe"
                $signed = $true
                break
              }
              Write-Host "::warning::Timestamp server $tsa failed, trying next..."
            }
            if (-not $signed) {
              Write-Host "::error::Failed to sign $exe"
              exit 1
            }
          }

      - name: Download cimipkg
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path tools -Force | Out-Null
          gh release download --repo windowsadmins/cimian-pkg --pattern "cimipkg.exe" --dir tools
          Write-Host "Downloaded: $(Get-Item tools/cimipkg.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Build MSI packages
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Path release -Force | Out-Null

          foreach ($arch in @("x64", "arm64")) {
            $stagingDir = "staging-$arch"

            # Create cimipkg project structure
            New-Item -ItemType Directory -Path "$stagingDir/payload" -Force | Out-Null
            New-Item -ItemType Directory -Path "$stagingDir/scripts" -Force | Out-Null

            # Copy signed binary
            Copy-Item "dist/$arch/checkin.exe" "$stagingDir/payload/" -Force

            # Process templates
            (Get-Content "build/pkg/build-info.yaml" -Raw) `
              -replace '\{\{VERSION\}\}', $version `
              -replace '\{\{ARCHITECTURE\}\}', $arch |
              Set-Content "$stagingDir/build-info.yaml" -Encoding UTF8

            (Get-Content "build/pkg/preinstall.ps1" -Raw) `
              -replace '\{\{VERSION\}\}', $version |
              Set-Content "$stagingDir/scripts/preinstall.ps1" -Encoding UTF8

            (Get-Content "build/pkg/postinstall.ps1" -Raw) `
              -replace '\{\{VERSION\}\}', $version |
              Set-Content "$stagingDir/scripts/postinstall.ps1" -Encoding UTF8

            # Build MSI via cimipkg
            Write-Host "Building MSI for $arch..."
            & .\tools\cimipkg.exe --verbose $stagingDir
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::cimipkg MSI build failed for $arch"
              exit 1
            }

            # Find and rename MSI output
            $msi = Get-ChildItem "$stagingDir/build/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($msi) {
              $dest = "release/Crypt-$arch-$version.msi"
              Move-Item $msi.FullName $dest -Force
              Write-Host "MSI created: $dest ($('{0:N2}' -f ((Get-Item $dest).Length / 1MB)) MB)"
            } else {
              Write-Host "::error::MSI output not found for $arch"
              exit 1
            }
          }

      - name: Sign MSI packages
        if: steps.cert.outputs.thumbprint != '' && steps.signtool.outputs.path != ''
        shell: pwsh
        run: |
          $signtool = "${{ steps.signtool.outputs.path }}"
          $thumbprint = "${{ steps.cert.outputs.thumbprint }}"
          $tsas = @('http://timestamp.digicert.com', 'http://timestamp.sectigo.com')

          foreach ($msi in Get-ChildItem release/*.msi) {
            $signed = $false
            foreach ($tsa in $tsas) {
              & $signtool sign /fd SHA256 /tr $tsa /td SHA256 /sha1 $thumbprint $msi.FullName 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Signed: $($msi.Name)"
                $signed = $true
                break
              }
              Write-Host "::warning::Timestamp server $tsa failed, trying next..."
            }
            if (-not $signed) {
              Write-Host "::error::Failed to sign $($msi.Name)"
              exit 1
            }
          }

      - name: Build NuGet packages
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"

          foreach ($arch in @("x64", "arm64")) {
            $stagingDir = "staging-$arch"

            Write-Host "Building NuGet package for $arch..."
            & .\tools\cimipkg.exe --nupkg --verbose $stagingDir
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::cimipkg NuGet build failed for $arch"
              exit 1
            }

            # Find and rename nupkg output
            $nupkg = Get-ChildItem "$stagingDir/build/*.nupkg" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($nupkg) {
              $dest = "release/Crypt-$arch-$version.nupkg"
              Move-Item $nupkg.FullName $dest -Force
              Write-Host "NuGet package created: $dest"
            } else {
              Write-Host "::warning::NuGet output not found for $arch, skipping"
            }
          }

      - name: Prepare release binaries
        shell: pwsh
        run: |
          foreach ($arch in @("x64", "arm64")) {
            Compress-Archive -Path "dist/$arch/checkin.exe" -DestinationPath "release/checkin-$arch.zip" -Force
            Write-Host "Created: release/checkin-$arch.zip"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Crypt ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: release/*
